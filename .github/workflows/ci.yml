name: Web Security Log Anomaly Detector CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      # Unit tests exercise the pandas-fallback feature engineering and the
      # scikit-learn anomaly scoring. PySpark, Kafka, and boto3 are integration
      # dependencies that the unit suite does not need, so they are omitted here
      # to keep CI fast and deterministic.
      - run: python -m pip install "pandas>=2.0,<3.0" "numpy>=1.24" "pyarrow>=12.0" "scikit-learn>=1.3" pytest
      - run: python -m pytest -q
      - run: python -m compileall scripts tests
